<!doctype html>
<html lang="es">
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Offline</title>
<style>
  body{margin:0;font-family:system-ui,Segoe UI,Inter;background:linear-gradient(180deg,#e7f2ff,#cfe3f5);display:grid;place-items:center;height:100vh;color:#1c2a36}
  .card{background:#fff;border:1px solid #e8edf4;border-radius:16px;box-shadow:0 10px 30px rgba(0,70,160,.15);padding:24px;max-width:420px}
  h1{margin:0 0 8px}
  p{margin:0 0 12px;color:#475569}
  a{display:inline-block;margin-top:10px;text-decoration:none;background:linear-gradient(90deg,#7b61ff,#a976ff);color:#fff;padding:10px 16px;border-radius:999px}
</style>
<body>
  <div class="card">
    <h1>Sin conexion</h1>
    <p>Puedes seguir usando la app. Lo nuevo se sincronizará al volver la conexión.</p>
    <a href="/">Reintentar</a>
  </div>
</body>
</html>
